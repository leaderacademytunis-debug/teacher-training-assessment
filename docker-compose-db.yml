version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: leader-academy-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: leader_academy
      MYSQL_USER: leader
      MYSQL_PASSWORD: leader123
      TZ: 'UTC'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - leader-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: leader-academy-phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: password
      PMA_DB: leader_academy
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - leader-network

volumes:
  mysql_data:
    driver: local

networks:
  leader-network:
    driver: bridge
